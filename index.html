<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BinMaster Prep Letter Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --red:#c8102e; --red-dk:#9e0c23; --red-lt:#fbeaed;
  --g900:#181818; --g800:#2c2c2c; --g700:#404040; --g600:#5a5a5a;
  --g400:#9a9a9a; --g200:#e4e4e4; --g100:#f4f4f4; --white:#fff;
  --amber:#b45309; --amber-lt:#fef3c7;
  --green:#166534; --green-lt:#dcfce7;
  --sh:0 2px 8px rgba(0,0,0,.10); --sh-lg:0 8px 32px rgba(0,0,0,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--g100);color:var(--g900);min-height:100vh}

header{background:var(--g900);color:var(--white);display:flex;align-items:stretch;border-bottom:4px solid var(--red)}
.hbar{background:var(--red);width:9px;flex-shrink:0}
.hcont{padding:15px 24px;display:flex;align-items:center;gap:14px}
.hcont h1{font-family:'Barlow Condensed',sans-serif;font-size:1.6rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase}
.hcont p{font-size:.72rem;color:#bbb;margin-top:2px;letter-spacing:.06em;text-transform:uppercase}

.layout{display:grid;grid-template-columns:1fr 400px;gap:18px;padding:20px;max-width:1560px;margin:0 auto}
@media(max-width:1000px){.layout{grid-template-columns:1fr}}

.card{background:var(--white);border-radius:8px;box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.ch{background:var(--g900);color:var(--white);padding:11px 18px;font-family:'Barlow Condensed',sans-serif;font-size:.88rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.cb{padding:18px}

.frow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.fg label{display:block;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--g600);margin-bottom:5px}
.fg input{width:100%;border:2px solid var(--g200);border-radius:5px;padding:9px 11px;font-family:'Barlow',sans-serif;font-size:.88rem;transition:border-color .15s;background:var(--white)}
.fg input:focus{outline:none;border-color:var(--red)}
.fg input.warn{border-color:var(--amber);background:var(--amber-lt)}
.dupmsg{display:none;font-size:.75rem;font-weight:600;color:var(--amber);margin-top:5px}
.dupmsg.show{display:block}

.btn-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--g100)}
.btn-row:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.pb{background:var(--g100);border:2px solid var(--g200);border-radius:5px;padding:5px 12px;font-family:'Barlow',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s;color:var(--g700);white-space:nowrap;line-height:1.3}
.pb:hover{border-color:var(--red);color:var(--red);background:var(--red-lt)}
.pb.on{background:var(--red);border-color:var(--red-dk);color:var(--white);box-shadow:0 2px 6px rgba(200,16,46,.3)}

.pvbox{background:#fafafa;border:1px solid var(--g200);border-radius:6px;padding:18px 22px;font-size:.82rem;line-height:1.9;color:var(--g800);max-height:520px;overflow-y:auto;font-family:'Barlow',sans-serif;white-space:pre-wrap;word-break:break-word}

.slist{list-style:none;max-height:220px;overflow-y:auto}
.slist li{display:flex;align-items:flex-start;gap:7px;padding:6px 0;border-bottom:1px solid var(--g200);font-size:.79rem}
.sx{flex-shrink:0;background:none;border:none;cursor:pointer;color:var(--g400);font-size:.85rem;padding:0 3px;transition:color .12s;margin-top:1px}
.sx:hover{color:var(--red)}

.genbtn{display:block;width:100%;background:var(--red);color:var(--white);border:none;border-radius:7px;padding:12px;font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.genbtn:hover{background:var(--red-dk)}

.hlist{list-style:none;max-height:200px;overflow-y:auto}
.hlist li{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid var(--g200);font-size:.78rem}

.editable-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}
.editable-table th{background:var(--g900);color:white;text-align:left;padding:8px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase}
.editable-table td{border:1px solid var(--g200);padding:5px}
.editable-table input{width:100%;border:none;padding:4px;font-family:inherit;font-size:inherit}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:1000;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:10px;padding:32px;max-width:420px;width:90%;text-align:center}
</style>
</head>
<body>

<header>
  <div class="hbar"></div>
  <div class="hcont">
    <span style="font-size:2rem">📬</span>
    <div>
      <h1>BinMaster Prep Letter Generator</h1>
      <p>Technical Support · Email Automation Tool</p>
    </div>
  </div>
</header>

<div class="layout">
  <div style="display:flex;flex-direction:column">
    <div class="card">
      <div class="ch">📋 Recipient Information</div>
      <div class="cb">
        <div class="frow">
          <div class="fg"><label>ORD Number</label><input id="ordNum" type="text" oninput="checkDup()">
            <div class="dupmsg" id="dupMsg">⚠ Already sent for this ORD</div>
          </div>
          <div class="fg"><label>Email Address</label><input id="emailAddr" type="email" oninput="refreshPreview()"></div>
          <div class="fg"><label>Email Name</label><input id="emailName" type="text" oninput="refreshPreview()"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="ch">🏷 Quick-Select by Product <button class="clrbtn" style="margin-left:auto; cursor:pointer" onclick="clearSel()">Clear All</button></div>
      <div class="cb" id="btnContainer">
        <div class="btn-row" id="row1"></div>
        <div class="btn-row" id="row2"></div>
        <div class="btn-row" id="row3"></div>
      </div>
    </div>

    <div class="card">
      <div class="ch">👁 Email Preview</div>
      <div class="cb">
        <div class="pvbox" id="preview"></div>
      </div>
    </div>

    <div class="card">
      <div class="ch">⚙ Manage Product Links</div>
      <div class="cb" style="overflow-x:auto">
        <table class="editable-table" id="linkTable">
          <thead>
            <tr><th>Product</th><th>Name</th><th>URL</th><th>Action</th></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <button class="pb" style="margin-top:10px" onclick="addRow()">+ Add Row</button>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="card">
      <div class="ch">✅ Selected Links <span class="badge" id="selBadge" style="margin-left:auto">0</span></div>
      <div class="cb"><ul class="slist" id="selList"></ul></div>
    </div>

    <div class="card">
      <div class="ch">📧 Action</div>
      <div class="cb">
        <button class="genbtn" onclick="generate()">Generate Email</button>
      </div>
    </div>

    <div class="card">
      <div class="ch">🕐 Sent History <button class="clrbtn" style="margin-left:auto; cursor:pointer" onclick="clearHist()">Clear</button></div>
      <div class="cb"><ul class="hlist" id="histList"></ul></div>
    </div>
  </div>
</div>

<div class="overlay" id="dupModal">
  <div class="modal">
    <h2>Already Sent</h2>
    <p id="dupModalMsg"></p>
    <button class="genbtn" onclick="doGenerate()">Send Anyway</button>
    <button class="pb" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
let rows = [
  {product:"NCR", name:"NCR: BinDisc Setup Guide", url:"https://bmtchspprt.github.io/radar-setup/bindisc.html"},
  {product:"NCR", name:"NCR Manual", url:"https://support.binmaster.com/kb/view/bc8e6a67-a401-4bc6-aa83-3423a0282860"},
  {product:"CNCR", name:"CNCR Manual", url:"https://support.binmaster.com/kb/view/d71297d9-77ac-49f8-97a4-6d183bf3adbc"},
  {product:"SmartBob", name:"SmartBob Manual", url:"https://support.binmaster.com/kb/view/c63c227b-5e08-4171-8c7f-58a804e3f06a"},
  {product:"3D", name:"3D Manual", url:"https://support.binmaster.com/kb/view/7d8bee17-d629-4075-a18b-7e0725f4b52a"},
  {product:"C100", name:"C-100 Setup Guide", url:"https://binmastercody.github.io/c100/"}
].map((d,i)=>({id:i,...d}));

const layoutRows = [
  ["NCR", "CNCR", "3D", "SmartBob", "Senix", "GWR"],
  ["BinCloud", "Binventory", "Gateway", "LTX", "C100", "C50", "DPM", "LTR100"],
  ["Rotary", "Vibrating Probe", "FD-2000", "Diaphragm", "Capacitance Probe", "Airbrator"]
];

let sel = new Set();
let history = JSON.parse(localStorage.getItem('bm_hist')||'[]');

function renderBtns(){
  layoutRows.forEach((row, i) => {
    const container = document.getElementById(`row${i+1}`);
    container.innerHTML = '';
    row.forEach(p => {
      const b = document.createElement('button');
      b.className = 'pb'; b.textContent = p; b.dataset.p = p;
      b.onclick = () => toggleProd(p);
      container.appendChild(b);
    });
  });
  syncBtns();
}

function toggleProd(p){
  const ids = rows.filter(r => r.product === p).map(r => r.id);
  const allOn = ids.length > 0 && ids.every(id => sel.has(id));
  ids.forEach(id => allOn ? sel.delete(id) : sel.add(id));
  syncBtns(); renderSel(); refreshPreview();
}

function syncBtns(){
  document.querySelectorAll('.pb[data-p]').forEach(b => {
    const p = b.dataset.p;
    const ids = rows.filter(r => r.product === p).map(r => r.id);
    b.classList.toggle('on', ids.length > 0 && ids.every(id => sel.has(id)));
  });
}

function renderTable(){
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td><input value="${r.product}" onchange="updateRow(${r.id}, 'product', this.value)"></td>
      <td><input value="${r.name}" onchange="updateRow(${r.id}, 'name', this.value)"></td>
      <td><input value="${r.url}" onchange="updateRow(${r.id}, 'url', this.value)"></td>
      <td><button class="sx" onclick="deleteRow(${r.id})">✕</button></td>
    </tr>`).join('');
}

function updateRow(id, field, val){
  const r = rows.find(x => x.id === id);
  if(r) r[field] = val;
  refreshPreview();
}

function addRow(){
  const newId = rows.length ? Math.max(...rows.map(r=>r.id)) + 1 : 0;
  rows.push({id: newId, product:"", name:"", url:""});
  renderTable();
}

function deleteRow(id){
  rows = rows.filter(r => r.id !== id);
  sel.delete(id);
  renderTable(); renderSel(); syncBtns(); refreshPreview();
}

function renderSel(){
  const ul = document.getElementById('selList');
  const items = rows.filter(r => sel.has(r.id));
  document.getElementById('selBadge').textContent = items.length;
  ul.innerHTML = items.map(r => `<li><span style="flex:1">> ${r.name}</span><button class="sx" onclick="removeSel(${r.id})">✕</button></li>`).join('');
}

function removeSel(id){ sel.delete(id); syncBtns(); renderSel(); refreshPreview(); }

function refreshPreview(){
  const name = document.getElementById('emailName').value || '[Name]';
  const items = rows.filter(r => sel.has(r.id));
  const linkHtml = items.map(r => `> <a href="${r.url}">${r.name}</a>`).join('\n');
  
  document.getElementById('preview').innerHTML = `Hi ${name},\n\nThanks for choosing BinMaster. Here are the resources for your system:\n\n${linkHtml}\n\nBinMaster Technical Support`;
}

function generate(){
  const ord = document.getElementById('ordNum').value;
  if(history.some(h => h.ord === ord)) {
    document.getElementById('dupModalMsg').textContent = `ORD ${ord} was already sent.`;
    document.getElementById('dupModal').classList.add('open');
  } else { doGenerate(); }
}

function doGenerate(){
  closeModal();
  const ord = document.getElementById('ordNum').value;
  const email = document.getElementById('emailAddr').value;
  const name = document.getElementById('emailName').value;
  const items = rows.filter(r => sel.has(r.id));
  const body = `Hi ${name},\n\nResources:\n${items.map(r=>`> ${r.name}: ${r.url}`).join('\n')}`;
  
  window.location.href = `mailto:${email}?subject=BinMaster Prep ${ord}&body=${encodeURIComponent(body)}`;
  history.push({ord, email, date: new Date().toLocaleDateString()});
  localStorage.setItem('bm_hist', JSON.stringify(history));
  renderHist();
}

function closeModal(){ document.getElementById('dupModal').classList.remove('open'); }
function clearSel(){ sel.clear(); syncBtns(); renderSel(); refreshPreview(); }
function clearHist(){ history=[]; localStorage.setItem('bm_hist', '[]'); renderHist(); }

function renderHist(){
  document.getElementById('histList').innerHTML = history.map(h => `<li><b>${h.ord}</b>: ${h.email}</li>`).join('');
}

renderBtns(); renderTable(); renderSel(); renderHist(); refreshPreview();
</script>
</body>
</html>
